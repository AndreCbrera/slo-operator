replicaCount: 1

image:
  repository: ghcr.io/acabrera02/slo-operator
  tag: ""
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""
  annotations: {}

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

leaderElection:
  enabled: true

metrics:
  enabled: true
  port: 8080

healthProbe:
  port: 8081

nodeSelector: {}
tolerations: []
affinity: {}
